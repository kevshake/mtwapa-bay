name: Sanity Check

on:
  push:
    branches: [main, master, qa/**]
  pull_request:
    branches: [main, master]

jobs:
  sanity:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm run sanity
      - run: npm test
